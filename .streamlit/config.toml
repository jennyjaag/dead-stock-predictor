# ClearShelf (by Rein) — equestrian, premium palette.
# Brand green is reserved for the brand; risk uses red/amber, and "healthy" is
# neutral grey so it never competes with the signature colour.
[theme]
primaryColor = "#1F5A43"            # deep racing green — signature / buttons
backgroundColor = "#F7F5EF"         # warm cream "paper"
secondaryBackgroundColor = "#EFEBDF"  # deeper cream — sidebar / cards
textColor = "#16241F"               # charcoal-green ink
font = "sans serif"

[server]
headless = true
